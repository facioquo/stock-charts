name: "Publish @facioquo/indy-charts"

on:
  push:
    branches:
      - main
    paths:
      - 'libs/indy-charts/**'
      - 'libs/indy-charts/package.json'
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 24

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: "Publish indy-charts to GitHub Packages"
    runs-on: ubuntu-latest
    environment: pkg.github.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          registry-url: https://npm.pkg.github.com
          scope: "@facioquo"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        working-directory: libs/indy-charts
        run: pnpm run build

      - name: Run package tests
        working-directory: libs/indy-charts
        run: pnpm run test

      - name: Publish @facioquo/indy-charts
        working-directory: libs/indy-charts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PACKAGE_VERSION=$(jq -r '.version' package.json)
          PACKAGE_NAME=$(jq -r '.name' package.json)

          if [[ "$PACKAGE_VERSION" == *-* ]]; then
            NPM_TAG="next"
          else
            NPM_TAG="latest"
          fi

          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" > /dev/null 2>&1; then
            echo "Version $PACKAGE_VERSION already published; skipping publish."
          else
            echo "Publishing $PACKAGE_NAME@$PACKAGE_VERSION with tag '$NPM_TAG'"
            pnpm publish --no-git-checks --access restricted --tag "$NPM_TAG"
          fi
