name: "CI"

on:
  pull_request:
  push:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 24
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  TESTINGPLATFORM_TELEMETRY_OPTOUT: 1

# Default to read-only access to repo contents; jobs that need more (e.g.
# dorny/test-reporter writing check runs) override at the job level.
permissions:
  contents: read

jobs:
  test-backend:
    runs-on: ubuntu-latest
    permissions:
      # dorny/test-reporter writes a check run with the parsed .trx results.
      contents: read
      checks: write

    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.x"
          dotnet-quality: "ga"
          cache: true
          cache-dependency-path: "**/packages.lock.json"

      - name: Build .NET solution
        run: >
          dotnet build Charts.sln
          --configuration Release
          --property:ContinuousIntegrationBuild=true
          -warnAsError

      - name: Verify .NET formatting
        run: dotnet format Charts.sln --verify-no-changes

      - name: Run backend tests with coverage
        run: |
          dotnet tool restore
          dotnet test Charts.sln \
            --collect:"XPlat Code Coverage" \
            --results-directory:./server/coverage \
            --logger:trx \
            --configuration Release \
            --property:ContinuousIntegrationBuild=true \
            -warnAsError

      - name: Convert coverage to lcov format
        run: |
          dotnet tool run reportgenerator \
            -reports:"server/coverage/**/coverage.cobertura.xml" \
            -targetdir:"server/coverage" \
            -reporttypes:"lcov"

      - name: Upload backend coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: ./server/coverage/lcov.info
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

      - name: Publish backend test results
        uses: dorny/test-reporter@v2
        if: success() || failure()
        with:
          name: xUnit Tests
          path: server/coverage/*.trx
          reporter: dotnet-trx

      - name: Upload backend coverage artifacts
        if: github.event_name == 'pull_request' && (success() || failure())
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage-report
          path: |
            server/coverage/*.trx
            server/coverage/lcov.info

  test-libraries:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build libraries
        run: |
          pnpm --filter @facioquo/chartjs-chart-financial run build
          pnpm --filter @facioquo/indy-charts run build

      - name: Lint libraries
        run: |
          pnpm --filter '@facioquo/chartjs-chart-financial' run lint --max-warnings=0
          pnpm --filter '@facioquo/indy-charts' run lint --max-warnings=0

      - name: Run library unit tests
        run: pnpm run test:libs

      - name: Run package consumption smoke test
        run: pnpm run smoke:package-consumption

  test-website:
    needs: [test-libraries]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build libraries
        # Client consumes @facioquo/indy-charts via workspace:* and imports from
        # its dist/, so libs must be built before the Angular build/test steps.
        run: |
          pnpm --filter @facioquo/chartjs-chart-financial run build
          pnpm --filter @facioquo/indy-charts run build

      - name: Check web formatting
        run: pnpm run format:web:check

      - name: Lint client
        run: pnpm --filter @stock-charts/client run lint

      - name: Lint CSS
        run: pnpm run lint:css

      - name: Run client unit tests with coverage
        run: pnpm --filter @stock-charts/client run test:coverage

      - name: Upload frontend coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: ./client/coverage/lcov.info
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: false

      - name: Upload frontend coverage artifacts
        if: github.event_name == 'pull_request' && (success() || failure())
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage-report
          path: client/coverage/

      - name: Build production site
        run: pnpm --filter @stock-charts/client run build.prod

  test-web:
    # React migration foundation app (web/). Runs alongside the Angular client
    # job; client/ stays the deployed app until the React port reaches parity.
    needs: [test-libraries]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build libraries
        # web/ consumes @facioquo/indy-charts via workspace:* and imports from
        # its dist/, so libs must be built before the web build/test steps.
        run: |
          pnpm --filter @facioquo/chartjs-chart-financial run build
          pnpm --filter @facioquo/indy-charts run build

      - name: Check web formatting
        run: pnpm --filter @stock-charts/web run format:check

      - name: Run web unit tests with coverage
        run: pnpm --filter @stock-charts/web run test:coverage

      - name: Build web app
        run: pnpm --filter @stock-charts/web run build

  test-e2e:
    runs-on: ubuntu-latest
    needs: [test-libraries, test-website]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build libraries
        # Angular dev server (used by Playwright's webServer config) runs from
        # source but needs the consumed library dist/ output to exist.
        run: |
          pnpm --filter @facioquo/chartjs-chart-financial run build
          pnpm --filter @facioquo/indy-charts run build

      - name: Install Playwright Chromium
        run: pnpm --filter @stock-charts/playwright-tests exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: tests/playwright/playwright-report/
          retention-days: 3

  lint-and-test:
    runs-on: ubuntu-slim
    needs: [test-backend, test-libraries, test-website, test-web, test-e2e]
    if: always()
    steps:
      - name: Verify required jobs succeeded
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "One or more required jobs did not succeed."
          exit 1
