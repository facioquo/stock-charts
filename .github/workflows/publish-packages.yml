name: "Publish packages"

on:
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 24.14.0

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: "Publish to GitHub Packages"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          registry-url: https://npm.pkg.github.com
          scope: "@facioquo"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build libraries
        run: |
          pnpm --filter @facioquo/chartjs-chart-financial run build
          pnpm --filter @facioquo/indy-charts run build

      - name: Run library tests
        run: |
          pnpm --filter @facioquo/chartjs-chart-financial run test
          pnpm --filter @facioquo/indy-charts run test

      - name: Publish @facioquo/chartjs-chart-financial
        working-directory: libs/chartjs-financial
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PACKAGE_VERSION=$(jq -r '.version' package.json)
          PACKAGE_NAME=$(jq -r '.name' package.json)

          # Determine if this is a prerelease (contains alpha, rc, beta, etc.)
          if [[ "$PACKAGE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+-[a-zA-Z]+ ]]; then
            NPM_TAG="next"
          else
            NPM_TAG="latest"
          fi

          # Check if the version already exists in the registry (safe for workflow reruns)
          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" > /dev/null 2>&1; then
            echo "Version $PACKAGE_VERSION already published; skipping publish."
          else
            echo "Publishing $PACKAGE_NAME@$PACKAGE_VERSION with tag '$NPM_TAG'"
            pnpm publish --no-git-checks --access restricted --tag "$NPM_TAG"
          fi

      - name: Publish @facioquo/indy-charts
        working-directory: libs/indy-charts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PACKAGE_VERSION=$(jq -r '.version' package.json)
          PACKAGE_NAME=$(jq -r '.name' package.json)

          # Determine if this is a prerelease (contains alpha, rc, beta, etc.)
          if [[ "$PACKAGE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+-[a-zA-Z]+ ]]; then
            NPM_TAG="next"
          else
            NPM_TAG="latest"
          fi

          # Check if the version already exists in the registry (safe for workflow reruns)
          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" > /dev/null 2>&1; then
            echo "Version $PACKAGE_VERSION already published; skipping publish."
          else
            echo "Publishing $PACKAGE_NAME@$PACKAGE_VERSION with tag '$NPM_TAG'"
            pnpm publish --no-git-checks --access restricted --tag "$NPM_TAG"
          fi
