name: Deploy website

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "web/**"
      - "server/**"
      - ".github/workflows/deploy-website.yml"

concurrency:
  group: website-deployer-${{ github.event.pull_request.number || 'main' }}
  cancel-in-progress: true

permissions:
  contents: write
  # `packages: read` lets GITHUB_TOKEN resolve @facioquo scope from GitHub
  # Packages (.npmrc routes @facioquo:registry=https://npm.pkg.github.com).
  packages: read

env:
  NODE_VERSION: 24

jobs:
  versioning:
    name: Define version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.marker.outputs.version }}

    steps:
      - name: Define marker
        id: marker
        run: echo "version=$(date +'%Y.%m.%d')-${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Summary output
        run: |
          {
            echo "| Info | Value |"
            echo "| :--- | :---- |"
            echo "| Version | ${{ steps.marker.outputs.version }} |"
          } >> $GITHUB_STEP_SUMMARY

  build-backend:
    name: Build backend
    runs-on: ubuntu-latest
    needs:
      - versioning
    env:
      url: https://charts.stockindicators.dev

    steps:
      - name: Checkout sources
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.x"
          dotnet-quality: "ga"
          cache: true
          cache-dependency-path: "**/packages.lock.json"

      - name: Replace cache markers
        uses: jacobtomlinson/gha-find-replace@v3
        with:
          find: "YYYY.MM.DD"
          replace: "${{ needs.versioning.outputs.version }}"
          regex: false

      - name: Build .NET solution
        run: >
          dotnet build Charts.sln
          --configuration Release
          --property:ContinuousIntegrationBuild=true
          -warnAsError

      - name: Package Web API
        if: github.ref == 'refs/heads/main'
        working-directory: server
        run: >
          dotnet publish WebApi/WebApi.csproj
          --configuration Release
          --property:PublishDir="../artifacts/api"

      - name: Package Functions
        if: github.ref == 'refs/heads/main'
        working-directory: server
        run: >
          dotnet publish Functions/Functions.csproj
          --configuration Release
          --property:PublishDir="../artifacts/fns"

      - name: Save Web API
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: api
          path: "server/artifacts/api"
          include-hidden-files: true

      - name: Save Functions
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: fns
          path: "server/artifacts/fns"
          include-hidden-files: true

  build-website:
    name: Build website
    runs-on: ubuntu-latest
    needs:
      - versioning

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          registry-url: https://npm.pkg.github.com
          scope: "@facioquo"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Replace cache markers
        uses: jacobtomlinson/gha-find-replace@v3
        with:
          find: "YYYY.MM.DD"
          replace: "${{ needs.versioning.outputs.version }}"
          regex: false

      - name: Inject Google Analytics tag
        if: github.ref == 'refs/heads/main'
        uses: jacobtomlinson/gha-find-replace@v3
        with:
          find: "__GaTag__"
          replace: "G-17DX6ZW6HP"
          regex: false
          include: "web/index.html"

      - name: Build libraries
        run: |
          pnpm --filter @facioquo/chartjs-chart-financial run build
          pnpm --filter @facioquo/indy-charts run build

      - name: Build site
        run: pnpm --filter @stock-charts/web run build
        env:
          INDICATORS_API_BASE: https://stock-charts-api.azurewebsites.net

      - name: Save artifacts
        uses: actions/upload-artifact@v7
        with:
          name: web
          path: web/dist/app
          include-hidden-files: true

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs:
      - versioning
      - build-backend
      - build-website

    environment:
      name: ${{ github.event_name == 'pull_request' && 'preview' || 'charts.stockindicators.dev' }}
      url: ${{ steps.deploy.outputs.pages-deployment-alias-url }}

    steps:
      - name: Download Functions package
        if: github.ref == 'refs/heads/main'
        uses: actions/download-artifact@v8
        with:
          name: fns
          path: artifacts/fns

      - name: Download API package
        if: github.ref == 'refs/heads/main'
        uses: actions/download-artifact@v8
        with:
          name: api
          path: artifacts/api

      - name: Download Web package
        uses: actions/download-artifact@v8
        with:
          name: web
          path: artifacts/web

      - name: Deploy Functions
        if: github.ref == 'refs/heads/main'
        uses: Azure/functions-action@v1
        with:
          app-name: stock-charts-functions
          package: artifacts/fns
          publish-profile: ${{ secrets.PUBLISH_PROFILE_FNS }}

      - name: Deploy API
        if: github.ref == 'refs/heads/main'
        uses: azure/webapps-deploy@v3
        with:
          app-name: stock-charts-api
          package: artifacts/api
          publish-profile: ${{ secrets.PUBLISH_PROFILE_API }}

      - name: Publish to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_KEY }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "latest"
          command: >
            pages deploy artifacts/web
            --project-name=${{ vars.CLOUDFLARE_PROJECT_NAME || 'stock-charts' }}
            ${{ github.event_name == 'pull_request' && format('--branch=pr-{0}', github.event.pull_request.number) || '' }}

      - name: Tag and draft release note
        uses: ncipollo/release-action@v1
        if: github.ref == 'refs/heads/main'
        with:
          body: |
            We’ve updated [charts.stockindicators.dev](https://charts.stockindicators.dev)
          generateReleaseNotes: true
          draft: true
          tag: ${{ needs.versioning.outputs.version }}
          commit: ${{ github.ref_name }}
